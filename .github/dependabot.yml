version: 2

updates:
  # Frontend NPM dependencies
  - package-ecosystem: "npm"
    directory: "/vulnerability-manager-frontend"
    # Le PR di Dependabot mirano alla dev line corrente, NON a main.
    # main riceve solo merge curati da develop dopo verifica manuale.
    # Aggiornare questo valore a ogni nuova release line (es. develop/v1.0.2).
    target-branch: "develop/v1.0.1"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 10
    # Controlliamo solo cio' che finisce in produzione: "production" esclude
    # il blocco devDependencies (playwright, prettier, http-proxy-middleware
    # diretto, @types/*). NB: react-scripts sta in dependencies (convenzione
    # CRA) quindi la sua toolchain di build (webpack-dev-server e transitive)
    # resta classificata "production" da npm pur non essendo spedita nel
    # bundle statico: quel rumore non e' eliminabile via config senza
    # migrare fuori da CRA.
    allow:
      - dependency-type: "production"
    groups:
      mui:
        patterns:
          - "@mui/*"
          - "@emotion/*"
      tanstack:
        patterns:
          - "@tanstack/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-*"
          - "@types/react*"
      security-patches:
        update-types:
          - "patch"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"

  # Backend Rust/Cargo dependencies
  - package-ecosystem: "cargo"
    directory: "/vulnerability-manager"
    target-branch: "develop/v1.0.1"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 10
    # Solo dipendenze di produzione (esclude le dev-dependencies del Cargo.toml).
    allow:
      - dependency-type: "production"
    groups:
      axum-ecosystem:
        patterns:
          - "axum*"
          - "tower*"
          - "hyper*"
      tokio-ecosystem:
        patterns:
          - "tokio*"
      security-patches:
        update-types:
          - "patch"
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop/v1.0.1"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
