name: Lint & Format

on:
  push:
    branches: [ main, develop, 'release/*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  rustfmt:
    name: Rust Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt

      - name: Check formatting
        working-directory: vulnerability-manager
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy (Rust Linter)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Install SARIF tools
        run: cargo install clippy-sarif sarif-fmt --locked

      - name: Run Clippy (SARIF output)
        working-directory: vulnerability-manager
        env:
          SQLX_OFFLINE: "true"
        run: >
          cargo clippy
          --all-targets
          --all-features
          --message-format=json
          | clippy-sarif
          | tee ../clippy-results.sarif
          | sarif-fmt
        continue-on-error: true

      - name: Upload Clippy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: clippy-results.sarif
          wait-for-processing: true

  prettier:
    name: Prettier Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vulnerability-manager-frontend/package-lock.json

      - name: Install dependencies
        working-directory: vulnerability-manager-frontend
        run: npm ci

      - name: Check formatting
        working-directory: vulnerability-manager-frontend
        run: npx prettier --check "src/**/*.{js,jsx,ts,tsx,json,css,scss}"
