name: Security Audit

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  push:
    paths:
      - '**/package*.json'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
  pull_request:
    paths:
      - '**/package*.json'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
  workflow_dispatch:

jobs:
  npm-audit:
    name: NPM Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vulnerability-manager-frontend/package-lock.json

      - name: Install dependencies
        working-directory: vulnerability-manager-frontend
        run: npm ci

      - name: Run npm audit (fail on high+)
        working-directory: vulnerability-manager-frontend
        run: npm audit --audit-level=high

      - name: Generate audit report
        if: failure()
        working-directory: vulnerability-manager-frontend
        run: npm audit --json > npm-audit-report.json || true

      - name: Upload audit report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: vulnerability-manager-frontend/npm-audit-report.json
          retention-days: 30

  cargo-audit:
    name: Cargo Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        working-directory: vulnerability-manager
        run: cargo audit

      - name: Generate cargo audit report
        if: failure()
        working-directory: vulnerability-manager
        run: cargo audit --json > cargo-audit-report.json || true

      - name: Upload cargo audit report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-audit-report
          path: vulnerability-manager/cargo-audit-report.json
          retention-days: 30

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'rust' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Setup Node.js (for JS analysis)
        if: matrix.language == 'javascript'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies (for JS analysis)
        if: matrix.language == 'javascript'
        working-directory: vulnerability-manager-frontend
        run: npm ci

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
