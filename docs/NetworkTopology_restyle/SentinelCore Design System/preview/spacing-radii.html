<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Corner Radii</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>
<div class="card">

<div class="row" style="gap:18px; align-items:flex-end;">
  
    <div class="col" style="gap:8px; align-items:center;">
      <div style="width:84px; height:84px; background:var(--sc-bg-paper-hi); border:1px solid var(--sc-border-default); border-radius:4px;"></div>
      <div class="lbl-token">--sc-radius-sm</div>
      <div class="lbl-meta">4px · tiny inline</div>
    </div>
    <div class="col" style="gap:8px; align-items:center;">
      <div style="width:84px; height:84px; background:var(--sc-bg-paper-hi); border:1px solid var(--sc-border-default); border-radius:6px;"></div>
      <div class="lbl-token">--sc-radius-md</div>
      <div class="lbl-meta">6px · buttons / chips</div>
    </div>
    <div class="col" style="gap:8px; align-items:center;">
      <div style="width:84px; height:84px; background:var(--sc-bg-paper-hi); border:1px solid var(--sc-border-default); border-radius:8px;"></div>
      <div class="lbl-token">--sc-radius-lg</div>
      <div class="lbl-meta">8px · cards</div>
    </div>
    <div class="col" style="gap:8px; align-items:center;">
      <div style="width:84px; height:84px; background:var(--sc-bg-paper-hi); border:1px solid var(--sc-border-default); border-radius:12px;"></div>
      <div class="lbl-token">--sc-radius-xl</div>
      <div class="lbl-meta">12px · hero</div>
    </div>
    <div class="col" style="gap:8px; align-items:center;">
      <div style="width:84px; height:84px; background:var(--sc-bg-paper-hi); border:1px solid var(--sc-border-default); border-radius:50%;"></div>
      <div class="lbl-token">--sc-radius-pill</div>
      <div class="lbl-meta">999px · node circle</div>
    </div>
</div>

</div>
</body>
</html>
