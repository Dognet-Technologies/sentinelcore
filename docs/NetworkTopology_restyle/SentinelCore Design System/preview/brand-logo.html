<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sigil / Mark</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>
<div class="card">

<div class="row" style="gap:32px; align-items:center; justify-content:center; padding:8px 0;">
  <div class="col" style="gap:8px; align-items:center;">
    <div style="background:var(--sc-bg-deep); padding:14px; border-radius:12px; border:1px solid var(--sc-border-subtle);">
      <img src="../assets/logo.svg" width="96" height="96" alt="sigil large"/>
    </div>
    <div class="lbl-meta">96px · canvas</div>
  </div>
  <div class="col" style="gap:8px; align-items:center;">
    <img src="../assets/logo.svg" width="48" height="48" alt="sigil med"/>
    <div class="lbl-meta">48px · navbar</div>
  </div>
  <div class="col" style="gap:8px; align-items:center;">
    <img src="../assets/logo.svg" width="24" height="24" alt="sigil sm"/>
    <div class="lbl-meta">24px · favicon</div>
  </div>
  <div class="col" style="gap:6px; max-width:240px;">
    <div class="sc-overline">Construction</div>
    <div class="sc-caption">Hexagonal shield. Four inner nodes connected by thin lines — visual rhyme with the topology graph. Cyan on navy.</div>
  </div>
</div>
