<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Surface Stack</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>
<div class="card">

<div class="col" style="gap:14px;">
  <div class="grid" style="grid-template-columns:repeat(5,1fr); gap:10px;">
    
      <div class="col" style="gap:6px;">
        <div style="width:100%; height:64px; border-radius:var(--sc-radius-md); background:#050B14; border:1px solid var(--sc-border-subtle);"></div>
        <div class="lbl-name">bg-deep</div>
        <div class="lbl-meta">#050B14</div>
      </div>
      <div class="col" style="gap:6px;">
        <div style="width:100%; height:64px; border-radius:var(--sc-radius-md); background:#0B1929; border:1px solid var(--sc-border-subtle);"></div>
        <div class="lbl-name">bg-default</div>
        <div class="lbl-meta">#0B1929</div>
      </div>
      <div class="col" style="gap:6px;">
        <div style="width:100%; height:64px; border-radius:var(--sc-radius-md); background:#102338; border:1px solid var(--sc-border-subtle);"></div>
        <div class="lbl-name">bg-elevated</div>
        <div class="lbl-meta">#102338</div>
      </div>
      <div class="col" style="gap:6px;">
        <div style="width:100%; height:64px; border-radius:var(--sc-radius-md); background:#1A2B3C; border:1px solid var(--sc-border-subtle);"></div>
        <div class="lbl-name">bg-paper</div>
        <div class="lbl-meta">#1A2B3C</div>
      </div>
      <div class="col" style="gap:6px;">
        <div style="width:100%; height:64px; border-radius:var(--sc-radius-md); background:#1E3247; border:1px solid var(--sc-border-subtle);"></div>
        <div class="lbl-name">bg-paper-hi</div>
        <div class="lbl-meta">#1E3247</div>
      </div>
  </div>
</div>

</div>
</body>
</html>
