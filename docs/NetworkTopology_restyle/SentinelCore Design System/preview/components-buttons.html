<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="_card.css">
<style>
.btn{font-family:var(--sc-font-sans);font-weight:600;font-size:14px;border-radius:6px;padding:9px 18px;border:1px solid transparent;cursor:pointer;transition:all 200ms cubic-bezier(0.4,0,0.2,1);letter-spacing:0;}
.btn-primary{background:var(--sc-cyan-500);color:#fff;}
.btn-primary:hover{background:var(--sc-cyan-400);box-shadow:0 4px 12px rgba(0,163,224,0.35);}
.btn-secondary{background:rgba(255,255,255,0.06);color:var(--sc-fg-primary);border-color:var(--sc-border-default);}
.btn-secondary:hover{background:rgba(255,255,255,0.10);border-color:var(--sc-border-cyan);}
.btn-outlined{background:transparent;color:var(--sc-cyan-400);border-color:var(--sc-cyan-700);}
.btn-outlined:hover{background:rgba(0,163,224,0.08);border-color:var(--sc-cyan-500);}
.btn-text{background:transparent;color:var(--sc-fg-secondary);}
.btn-text:hover{background:rgba(255,255,255,0.04);color:var(--sc-fg-primary);}
.btn-danger{background:var(--sc-critical);color:#fff;}
.btn-danger:hover{background:#EF5350;box-shadow:0 4px 12px rgba(244,67,54,0.35);}
.btn-icon{background:transparent;color:var(--sc-fg-secondary);padding:8px;border-radius:6px;display:inline-flex;}
.btn-icon:hover{background:rgba(255,255,255,0.06);color:var(--sc-fg-primary);}
</style>
</head>
<body>
<div class="card">

<div class="col" style="gap:14px;">
  <div class="row" style="gap:12px; flex-wrap:wrap;">
    <button class="btn btn-primary">Start Scan</button>
    <button class="btn btn-secondary">Edit Device</button>
    <button class="btn btn-outlined">Cancel</button>
    <button class="btn btn-text">Reset</button>
    <button class="btn btn-danger">Delete</button>
  </div>
  <div class="row" style="gap:12px;">
    <button class="btn btn-icon" title="Zoom In"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button>
    <button class="btn btn-icon" title="Refresh"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></button>
    <button class="btn btn-icon" title="Fullscreen"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/></svg></button>
  </div>
</div>

</div>
</body>
</html>
