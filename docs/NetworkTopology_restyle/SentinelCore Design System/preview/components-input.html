<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Form Inputs</title>
<link rel="stylesheet" href="_card.css">
<style>
.field{display:flex;flex-direction:column;gap:6px;}
.lbl{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--sc-fg-secondary);}
.input{background:rgba(255,255,255,0.03);border:1px solid var(--sc-border-default);border-radius:6px;padding:10px 14px;color:var(--sc-fg-primary);font-family:var(--sc-font-mono);font-size:13.5px;outline:none;width:100%;}
.input:focus,.input:hover{border-color:var(--sc-border-cyan);}
.input--search{display:flex;align-items:center;gap:10px;color:var(--sc-fg-tertiary);font-family:var(--sc-font-sans);}
.select{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.03);border:1px solid var(--sc-border-default);border-radius:6px;padding:10px 14px;color:var(--sc-fg-primary);font-size:13.5px;cursor:pointer;}
.select:hover{border-color:var(--sc-border-cyan);}
.select svg{color:var(--sc-fg-tertiary);}
</style>
</head>
<body>
<div class="card">

<div class="col" style="gap:12px;">
  <div class="field">
    <label class="lbl">IP range</label>
    <input class="input" value="192.168.1.0/24" />
  </div>
  <div class="row" style="gap:12px;">
    <div class="field" style="flex:1;">
      <label class="lbl">Scan type</label>
      <div class="select"><span>arp-scan</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div>
    </div>
    <div class="field" style="flex:1;">
      <label class="lbl">Search</label>
      <div class="input input--search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <span style="color:var(--sc-fg-tertiary);">Search hosts…</span>
      </div>
    </div>
  </div>
</div>

</div>
</body>
</html>
