<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Topology Connection Lines</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>
<div class="card">

<div class="col" style="gap:6px;">
  
    <div class="row" style="gap:18px; padding:6px 0;">
      <svg width="240" height="20" viewBox="0 0 240 20">
        <circle cx="10" cy="10" r="4" fill="none" stroke="#4CAF50" stroke-width="1"/>
        <line x1="14" y1="10" x2="226" y2="10" stroke="#4CAF50" stroke-width="2" stroke-dasharray="none" opacity="0.6"/>
        <circle cx="230" cy="10" r="4" fill="none" stroke="#4CAF50" stroke-width="1"/>
      </svg>
      <div class="lbl-name" style="min-width:180px;">active · normal · 0–69%</div>
      <div class="lbl-meta">#4CAF50</div>
    </div>
    <div class="row" style="gap:18px; padding:6px 0;">
      <svg width="240" height="20" viewBox="0 0 240 20">
        <circle cx="10" cy="10" r="4" fill="none" stroke="#FF9800" stroke-width="1"/>
        <line x1="14" y1="10" x2="226" y2="10" stroke="#FF9800" stroke-width="2" stroke-dasharray="none" opacity="0.6"/>
        <circle cx="230" cy="10" r="4" fill="none" stroke="#FF9800" stroke-width="1"/>
      </svg>
      <div class="lbl-name" style="min-width:180px;">active · warning · 70–89%</div>
      <div class="lbl-meta">#FF9800</div>
    </div>
    <div class="row" style="gap:18px; padding:6px 0;">
      <svg width="240" height="20" viewBox="0 0 240 20">
        <circle cx="10" cy="10" r="4" fill="none" stroke="#F44336" stroke-width="1"/>
        <line x1="14" y1="10" x2="226" y2="10" stroke="#F44336" stroke-width="2" stroke-dasharray="none" opacity="0.6"/>
        <circle cx="230" cy="10" r="4" fill="none" stroke="#F44336" stroke-width="1"/>
      </svg>
      <div class="lbl-name" style="min-width:180px;">active · critical · ≥90%</div>
      <div class="lbl-meta">#F44336</div>
    </div>
    <div class="row" style="gap:18px; padding:6px 0;">
      <svg width="240" height="20" viewBox="0 0 240 20">
        <circle cx="10" cy="10" r="4" fill="none" stroke="#B4C7D9" stroke-width="1"/>
        <line x1="14" y1="10" x2="226" y2="10" stroke="#B4C7D9" stroke-width="1" stroke-dasharray="5,5" opacity="0.6"/>
        <circle cx="230" cy="10" r="4" fill="none" stroke="#B4C7D9" stroke-width="1"/>
      </svg>
      <div class="lbl-name" style="min-width:180px;">inactive / pending</div>
      <div class="lbl-meta">#B4C7D9</div>
    </div>
    <div class="row" style="gap:18px; padding:6px 0;">
      <svg width="240" height="20" viewBox="0 0 240 20">
        <circle cx="10" cy="10" r="4" fill="none" stroke="#FF9800" stroke-width="1"/>
        <line x1="14" y1="10" x2="226" y2="10" stroke="#FF9800" stroke-width="2" stroke-dasharray="none" opacity="0.6"/>
        <circle cx="230" cy="10" r="4" fill="none" stroke="#FF9800" stroke-width="1"/>
      </svg>
      <div class="lbl-name" style="min-width:180px;">custom annotation</div>
      <div class="lbl-meta">#FF9800</div>
    </div>
    <div class="row" style="gap:18px; padding:6px 0;">
      <svg width="240" height="20" viewBox="0 0 240 20">
        <circle cx="10" cy="10" r="4" fill="none" stroke="#757575" stroke-width="1"/>
        <line x1="14" y1="10" x2="226" y2="10" stroke="#757575" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
        <circle cx="230" cy="10" r="4" fill="none" stroke="#757575" stroke-width="1"/>
      </svg>
      <div class="lbl-name" style="min-width:180px;">link down</div>
      <div class="lbl-meta">#757575</div>
    </div>
</div>

</div>
</body>
</html>
