<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Chart Palette</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>
<div class="card">

<div class="col" style="gap:14px;">
  <div class="row" style="gap:16px; flex-wrap:wrap;">
    
      <div class="row" style="gap:10px; min-width:140px;">
        <div style="width:16px; height:16px; border-radius:3px; background:#2196F3;"></div>
        <div class="col" style="gap:1px;">
          <div class="lbl-name">CPU</div>
          <div class="lbl-meta">#2196F3</div>
        </div>
      </div>
      <div class="row" style="gap:10px; min-width:140px;">
        <div style="width:16px; height:16px; border-radius:3px; background:#9C27B0;"></div>
        <div class="col" style="gap:1px;">
          <div class="lbl-name">Memory</div>
          <div class="lbl-meta">#9C27B0</div>
        </div>
      </div>
      <div class="row" style="gap:10px; min-width:140px;">
        <div style="width:16px; height:16px; border-radius:3px; background:#FF9800;"></div>
        <div class="col" style="gap:1px;">
          <div class="lbl-name">Disk</div>
          <div class="lbl-meta">#FF9800</div>
        </div>
      </div>
      <div class="row" style="gap:10px; min-width:140px;">
        <div style="width:16px; height:16px; border-radius:3px; background:#4CAF50;"></div>
        <div class="col" style="gap:1px;">
          <div class="lbl-name">Network</div>
          <div class="lbl-meta">#4CAF50</div>
        </div>
      </div>
      <div class="row" style="gap:10px; min-width:140px;">
        <div style="width:16px; height:16px; border-radius:3px; background:#E91E63;"></div>
        <div class="col" style="gap:1px;">
          <div class="lbl-name">Latency</div>
          <div class="lbl-meta">#E91E63</div>
        </div>
      </div>
      <div class="row" style="gap:10px; min-width:140px;">
        <div style="width:16px; height:16px; border-radius:3px; background:#00BCD4;"></div>
        <div class="col" style="gap:1px;">
          <div class="lbl-name">Bandwidth</div>
          <div class="lbl-meta">#00BCD4</div>
        </div>
      </div>
  </div>
  <!-- mini chart -->
  <svg viewBox="0 0 640 80" style="width:100%; height:80px;">
    <polyline fill="none" stroke="#2196F3" stroke-width="2" points="0,55 80,40 160,48 240,30 320,38 400,22 480,30 560,18 640,28"/>
    <polyline fill="none" stroke="#4CAF50" stroke-width="2" points="0,65 80,60 160,58 240,50 320,52 400,46 480,44 560,40 640,38" opacity="0.85"/>
    <polyline fill="none" stroke="#9C27B0" stroke-width="2" points="0,72 80,68 160,70 240,64 320,66 400,60 480,58 560,55 640,52" opacity="0.85"/>
  </svg>
</div>

</div>
</body>
</html>
