<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing Scale (4px grid)</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>
<div class="card">

<div class="col" style="gap:6px;">
  
    <div class="row" style="gap:14px;">
      <div class="lbl-token" style="width:60px;">--sc-space-1</div>
      <div style="height:10px; width:8px; background:var(--sc-cyan-500); border-radius:2px;"></div>
      <div class="lbl-meta">4px</div>
    </div>
    <div class="row" style="gap:14px;">
      <div class="lbl-token" style="width:60px;">--sc-space-2</div>
      <div style="height:10px; width:16px; background:var(--sc-cyan-500); border-radius:2px;"></div>
      <div class="lbl-meta">8px</div>
    </div>
    <div class="row" style="gap:14px;">
      <div class="lbl-token" style="width:60px;">--sc-space-3</div>
      <div style="height:10px; width:24px; background:var(--sc-cyan-500); border-radius:2px;"></div>
      <div class="lbl-meta">12px</div>
    </div>
    <div class="row" style="gap:14px;">
      <div class="lbl-token" style="width:60px;">--sc-space-4</div>
      <div style="height:10px; width:32px; background:var(--sc-cyan-500); border-radius:2px;"></div>
      <div class="lbl-meta">16px</div>
    </div>
    <div class="row" style="gap:14px;">
      <div class="lbl-token" style="width:60px;">--sc-space-5</div>
      <div style="height:10px; width:40px; background:var(--sc-cyan-500); border-radius:2px;"></div>
      <div class="lbl-meta">20px</div>
    </div>
    <div class="row" style="gap:14px;">
      <div class="lbl-token" style="width:60px;">--sc-space-6</div>
      <div style="height:10px; width:48px; background:var(--sc-cyan-500); border-radius:2px;"></div>
      <div class="lbl-meta">24px</div>
    </div>
    <div class="row" style="gap:14px;">
      <div class="lbl-token" style="width:60px;">--sc-space-8</div>
      <div style="height:10px; width:64px; background:var(--sc-cyan-500); border-radius:2px;"></div>
      <div class="lbl-meta">32px</div>
    </div>
    <div class="row" style="gap:14px;">
      <div class="lbl-token" style="width:60px;">--sc-space-10</div>
      <div style="height:10px; width:80px; background:var(--sc-cyan-500); border-radius:2px;"></div>
      <div class="lbl-meta">40px</div>
    </div>
    <div class="row" style="gap:14px;">
      <div class="lbl-token" style="width:60px;">--sc-space-12</div>
      <div style="height:10px; width:96px; background:var(--sc-cyan-500); border-radius:2px;"></div>
      <div class="lbl-meta">48px</div>
    </div>
</div>

</div>
</body>
</html>
