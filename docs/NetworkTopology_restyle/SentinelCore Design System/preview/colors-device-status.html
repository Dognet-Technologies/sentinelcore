<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Device & Link Status</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>
<div class="card">

<div class="col" style="gap:18px;">
  <div>
    <div class="sc-overline" style="margin-bottom:8px;">Device</div>
    <div class="row" style="gap:20px; flex-wrap:wrap;">
      
        <div class="row" style="gap:8px;">
          <div style="width:10px; height:10px; border-radius:50%; background:#4CAF50;"></div>
          <div class="lbl-name">online</div>
          <div class="lbl-meta">#4CAF50</div>
        </div>
        <div class="row" style="gap:8px;">
          <div style="width:10px; height:10px; border-radius:50%; background:#F44336;"></div>
          <div class="lbl-name">offline</div>
          <div class="lbl-meta">#F44336</div>
        </div>
        <div class="row" style="gap:8px;">
          <div style="width:10px; height:10px; border-radius:50%; background:#FF9800;"></div>
          <div class="lbl-name">maintenance</div>
          <div class="lbl-meta">#FF9800</div>
        </div>
        <div class="row" style="gap:8px;">
          <div style="width:10px; height:10px; border-radius:50%; background:#757575;"></div>
          <div class="lbl-name">unknown</div>
          <div class="lbl-meta">#757575</div>
        </div>
    </div>
  </div>
  <div>
    <div class="sc-overline" style="margin-bottom:8px;">Link · by utilization</div>
    <div class="row" style="gap:20px; flex-wrap:wrap;">
      
        <div class="row" style="gap:8px;">
          <div style="width:24px; height:2px; background:#4CAF50;"></div>
          <div class="lbl-name">normal · 0–69%</div>
        </div>
        <div class="row" style="gap:8px;">
          <div style="width:24px; height:2px; background:#FF9800;"></div>
          <div class="lbl-name">warning · 70–89%</div>
        </div>
        <div class="row" style="gap:8px;">
          <div style="width:24px; height:2px; background:#F44336;"></div>
          <div class="lbl-name">critical · ≥90%</div>
        </div>
        <div class="row" style="gap:8px;">
          <div style="width:24px; height:2px; background:#757575;"></div>
          <div class="lbl-name">down</div>
        </div>
    </div>
  </div>
</div>

</div>
</body>
</html>
