<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand Cyan Ramp</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>
<div class="card">

<div class="col" style="gap:14px;">
  <div class="grid" style="grid-template-columns:repeat(9,1fr); gap:6px;">
    
      <div class="col" style="gap:4px; align-items:center;">
        <div style="width:100%; aspect-ratio:1/1.2; background:#E6F6FB; border-radius:6px; "></div>
        <div class="lbl-meta" style="color:var(--sc-fg-tertiary);">50</div>
      </div>
      <div class="col" style="gap:4px; align-items:center;">
        <div style="width:100%; aspect-ratio:1/1.2; background:#B3E4F4; border-radius:6px; "></div>
        <div class="lbl-meta" style="color:var(--sc-fg-tertiary);">100</div>
      </div>
      <div class="col" style="gap:4px; align-items:center;">
        <div style="width:100%; aspect-ratio:1/1.2; background:#80D2EC; border-radius:6px; "></div>
        <div class="lbl-meta" style="color:var(--sc-fg-tertiary);">200</div>
      </div>
      <div class="col" style="gap:4px; align-items:center;">
        <div style="width:100%; aspect-ratio:1/1.2; background:#4DBFE5; border-radius:6px; "></div>
        <div class="lbl-meta" style="color:var(--sc-fg-secondary);">300</div>
      </div>
      <div class="col" style="gap:4px; align-items:center;">
        <div style="width:100%; aspect-ratio:1/1.2; background:#33B5E5; border-radius:6px; "></div>
        <div class="lbl-meta" style="color:var(--sc-fg-secondary);">400</div>
      </div>
      <div class="col" style="gap:4px; align-items:center;">
        <div style="width:100%; aspect-ratio:1/1.2; background:#00A3E0; border-radius:6px; box-shadow:0 0 0 2px var(--sc-bg-paper), 0 0 0 3px var(--sc-cyan-300);"></div>
        <div class="lbl-meta" style="color:var(--sc-fg-secondary);">500</div>
      </div>
      <div class="col" style="gap:4px; align-items:center;">
        <div style="width:100%; aspect-ratio:1/1.2; background:#0891C7; border-radius:6px; "></div>
        <div class="lbl-meta" style="color:var(--sc-fg-secondary);">600</div>
      </div>
      <div class="col" style="gap:4px; align-items:center;">
        <div style="width:100%; aspect-ratio:1/1.2; background:#007FAD; border-radius:6px; "></div>
        <div class="lbl-meta" style="color:var(--sc-fg-secondary);">700</div>
      </div>
      <div class="col" style="gap:4px; align-items:center;">
        <div style="width:100%; aspect-ratio:1/1.2; background:#00455C; border-radius:6px; "></div>
        <div class="lbl-meta" style="color:var(--sc-fg-secondary);">900</div>
      </div>
  </div>
  <div class="row" style="justify-content:space-between;">
    <div class="lbl-name">Entuity Cyan · primary at 500</div>
    <div class="lbl-token">#00A3E0</div>
  </div>
</div>

</div>
</body>
</html>
