<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Severity</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>
<div class="card">

<div class="col" style="gap:10px;">
  
    <div class="row" style="justify-content:space-between;">
      <div class="row" style="gap:14px;">
        <div class="swatch--sm swatch" style="background:#F44336;"></div>
        <div class="lbl-name">Critical</div>
      </div>
      <div class="row" style="gap:24px;">
        <div class="lbl-token">--sc-critical</div>
        <div class="lbl-meta">#F44336</div>
      </div>
    </div>
    <div class="row" style="justify-content:space-between;">
      <div class="row" style="gap:14px;">
        <div class="swatch--sm swatch" style="background:#FF9800;"></div>
        <div class="lbl-name">High</div>
      </div>
      <div class="row" style="gap:24px;">
        <div class="lbl-token">--sc-high</div>
        <div class="lbl-meta">#FF9800</div>
      </div>
    </div>
    <div class="row" style="justify-content:space-between;">
      <div class="row" style="gap:14px;">
        <div class="swatch--sm swatch" style="background:#FFC107;"></div>
        <div class="lbl-name">Warning</div>
      </div>
      <div class="row" style="gap:24px;">
        <div class="lbl-token">--sc-warning</div>
        <div class="lbl-meta">#FFC107</div>
      </div>
    </div>
    <div class="row" style="justify-content:space-between;">
      <div class="row" style="gap:14px;">
        <div class="swatch--sm swatch" style="background:#FFEB3B;"></div>
        <div class="lbl-name">Medium</div>
      </div>
      <div class="row" style="gap:24px;">
        <div class="lbl-token">--sc-medium</div>
        <div class="lbl-meta">#FFEB3B</div>
      </div>
    </div>
    <div class="row" style="justify-content:space-between;">
      <div class="row" style="gap:14px;">
        <div class="swatch--sm swatch" style="background:#8BC34A;"></div>
        <div class="lbl-name">Low</div>
      </div>
      <div class="row" style="gap:24px;">
        <div class="lbl-token">--sc-low</div>
        <div class="lbl-meta">#8BC34A</div>
      </div>
    </div>
    <div class="row" style="justify-content:space-between;">
      <div class="row" style="gap:14px;">
        <div class="swatch--sm swatch" style="background:#2196F3;"></div>
        <div class="lbl-name">Info</div>
      </div>
      <div class="row" style="gap:24px;">
        <div class="lbl-token">--sc-info</div>
        <div class="lbl-meta">#2196F3</div>
      </div>
    </div>
    <div class="row" style="justify-content:space-between;">
      <div class="row" style="gap:14px;">
        <div class="swatch--sm swatch" style="background:#4CAF50;"></div>
        <div class="lbl-name">Success</div>
      </div>
      <div class="row" style="gap:24px;">
        <div class="lbl-token">--sc-success</div>
        <div class="lbl-meta">#4CAF50</div>
      </div>
    </div>
</div>

</div>
</body>
</html>
