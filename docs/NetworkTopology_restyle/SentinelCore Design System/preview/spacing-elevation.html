<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Elevation & Glow</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>
<div class="card">

<div class="row" style="gap:18px;">
  
    <div class="col" style="gap:10px; align-items:center;">
      <div style="width:96px; height:62px; background:var(--sc-bg-paper-hi); border:1px solid var(--sc-border-subtle); border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.25);"></div>
      <div class="lbl-token">--sc-shadow-1</div>
      <div class="lbl-meta">resting</div>
    </div>
    <div class="col" style="gap:10px; align-items:center;">
      <div style="width:96px; height:62px; background:var(--sc-bg-paper-hi); border:1px solid var(--sc-border-subtle); border-radius:8px; box-shadow:0 4px 12px rgba(0,0,0,.30);"></div>
      <div class="lbl-token">--sc-shadow-2</div>
      <div class="lbl-meta">raised</div>
    </div>
    <div class="col" style="gap:10px; align-items:center;">
      <div style="width:96px; height:62px; background:var(--sc-bg-paper-hi); border:1px solid var(--sc-border-subtle); border-radius:8px; box-shadow:0 6px 16px rgba(0,0,0,.35);"></div>
      <div class="lbl-token">--sc-shadow-3</div>
      <div class="lbl-meta">popover</div>
    </div>
    <div class="col" style="gap:10px; align-items:center;">
      <div style="width:96px; height:62px; background:var(--sc-bg-paper-hi); border:1px solid var(--sc-border-subtle); border-radius:8px; box-shadow:0 0 20px rgba(0,163,224,.35);"></div>
      <div class="lbl-token">--sc-glow-cyan</div>
      <div class="lbl-meta">focus</div>
    </div>
    <div class="col" style="gap:10px; align-items:center;">
      <div style="width:96px; height:62px; background:var(--sc-bg-paper-hi); border:1px solid var(--sc-border-subtle); border-radius:8px; box-shadow:0 0 12px rgba(244,67,54,.55);"></div>
      <div class="lbl-token">--sc-glow-critical</div>
      <div class="lbl-meta">critical</div>
    </div>
</div>

</div>
</body>
</html>
